plugins {
    id 'org.springframework.boot' version '3.2.2'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'java-library'
}

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/milestone' }
}

dependencies {
    // 🍃 Spring Boot Core
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    
    // 🧠 AI: Spring AI (Preferred heart)
    implementation 'org.springframework.ai:spring-ai-ollama-spring-boot-starter:1.0.0-M4'
    
    // 🧠 AI: LangChain4j (Legacy Support / High-level Agents)
    implementation 'dev.langchain4j:langchain4j:1.10.0'
    implementation 'dev.langchain4j:langchain4j-ollama:1.10.0'
    
    // 🧱 Code Generation: JavaPoet
    implementation 'com.squareup:javapoet:1.13.0'
    
    // 🔍 Analysis: JavaParser
    implementation 'com.github.javaparser:javaparser-core:3.26.2'
    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.26.2'
    
    // 🛠 Utils
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    implementation 'org.yaml:snakeyaml:2.2'
    
    // 🧪 Testing Support
    implementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    implementation 'org.mockito:mockito-junit-jupiter:5.5.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
        exceptionFormat = "full"
    }
}

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

// Enable generation of plain jar for other modules to consume
jar {
    enabled = true
}

// bootJar is still useful if we want to run it as a standalone LSP server
bootJar {
    enabled = true
    archiveClassifier = 'boot'
}
