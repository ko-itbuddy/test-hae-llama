plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
    id 'java-library'
}

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/milestone' }
    maven { url 'https://repo.spring.io/snapshot' }
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.shell:spring-shell-dependencies:3.2.0"
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    // 🐚 CLI Power: Lightweight Shell environment instead of Tomcat
    implementation 'org.springframework.shell:spring-shell-starter'
    
    // ⚡ Reactive WebClient is needed for Spring AI, but we don't need the full Web MVC (Tomcat)
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    
    // 🧠 Pure Ollama Model (Milestone 1.1.0-M4)
    implementation 'org.springframework.ai:spring-ai-starter-model-ollama:1.1.0-M4'
    
    // 🧱 Tools
    implementation 'com.squareup:javapoet:1.10.0'
    implementation 'com.github.javaparser:javaparser-core:3.27.1'
    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.27.1'
    
    compileOnly 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.42'
    implementation 'org.yaml:snakeyaml:2.3'
    
    implementation 'org.junit.jupiter:junit-jupiter-api:5.11.4'
    implementation 'org.mockito:mockito-junit-jupiter:5.3.1'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
}

tasks.named('test') {
    useJUnitPlatform()
}

bootJar {
    enabled = true
    archiveClassifier = 'boot'
}

jar {
    enabled = true
}
